name: Release Publish Assets

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to publish assets to
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-publish-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Build chopin upgrade artifact
        shell: bash
        run: ./scripts/build-chopin-upgrade-artifact.sh

      - name: Load release metadata
        id: release-meta
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name || github.event.release.tag_name }}
        run: |
          set -euo pipefail
          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}")"

          release_name="$(echo "${release_json}" | jq -r '.name // .tag_name')"
          prerelease_flag="$(echo "${release_json}" | jq -r '.prerelease')"
          release_body="$(echo "${release_json}" | jq -r '.body // ""')"

          {
            echo "name=${release_name}"
            echo "tag=${TAG_NAME}"
            echo "prerelease=${prerelease_flag}"
            echo "body<<EOF"
            echo "${release_body}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release-meta.outputs.tag }}
        run: |
          set -euo pipefail

          cd images/chopin/artifacts

          shopt -s nullglob
          tarballs=( *.tar.gz )

          if [[ "${#tarballs[@]}" -ne 1 ]]; then
            echo "Expected exactly one upgrade tarball, found ${#tarballs[@]}" >&2
            ls -la >&2
            exit 1
          fi

          release_tarball="chopin-upgrade-${RELEASE_TAG}.tar.gz"
          mv "${tarballs[0]}" "${release_tarball}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.event.release.tag_name }}
          name: ${{ steps.release-meta.outputs.name }}
          body: ${{ steps.release-meta.outputs.body }}
          prerelease: ${{ steps.release-meta.outputs.prerelease }}
          files: |
            images/chopin/artifacts/chopin-upgrade-${{ steps.release-meta.outputs.tag }}.tar.gz
