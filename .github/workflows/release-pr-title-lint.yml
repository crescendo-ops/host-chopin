name: Release PR Title Lint

# Description: Enforces semantic PR titles required by release automation.

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

jobs:
  release-pr-title-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          requireScope: true
          types: |
            feat
            fix
            perf
            deps
            revert
            style
            chore
            docs
            refactor
            test
            ci
            build
