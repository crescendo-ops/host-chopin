name: Publish Stable Release Assets

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Build chopin upgrade artifact
        run: ./images/chopin/build.sh

      - name: Generate checksums
        run: |
          cd images/chopin/.artifacts
          sha256sum *.tar.gz > SHA256SUMS

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            images/chopin/.artifacts/*.tar.gz
            images/chopin/.artifacts/SHA256SUMS
